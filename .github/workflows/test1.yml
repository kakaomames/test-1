name: Ultimate Portable Toolkit and Runtime Factory

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# リポジトリの変更（push）およびReleaseへのアセット追加に必要な権限を完全解放
permissions:
  contents: write

jobs:
  build-pack-and-release-complete:
    runs-on: ubuntu-latest

    steps:
    # 1. 認証トークンを維持した状態でリポジトリを完全チェックアウト
    - name: ターゲットリポジトリのチェックアウト
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    # 各コンパイラの初期ビルド・配備に必要な最小限のホスト環境
    - name: ホストJava環境のセットアップ
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: ホストPython環境のセットアップ
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: ホスト.NET SDKのセットアップ
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0'

    # 2. 初期兵装：爆速ダウンローダー「aria2c」をシステムに配備
    - name: 爆速ダウンローダー (aria2c) の配備
      run: |
        echo "[missionLog] [ACTION] ベースとなるaria2cのインストールを開始します。"
        sudo apt-get update
        sudo apt-get install -y aria2
        echo "[missionLog] [STATUS] aria2c の配備が完了しました。"

    # 3. メディア系ツール、デコンパイラ、ポータブルランタイム群をすべて集め、1つのフォルダに完全統合
    - name: 全ランタイムおよび全デコンパイラ・メディアツールの強襲配置
      run: |
        echo "[missionLog] [ACTION] 全ツールおよび全ランタイムの強襲取得作戦を開始します。"
        
        # 格納用ディレクトリをリポジトリ内に構築
        FACTORY_DIR="$GITHUB_WORKSPACE/bin_factory"
        RUNTIME_DIR="$FACTORY_DIR/runtimes"
        TOOL_DIR="$FACTORY_DIR/tools"
        
        mkdir -p "$RUNTIME_DIR"
        mkdir -p "$TOOL_DIR"
        
        # 一時作業領域の作成
        mkdir -p $HOME/factory_tmp
        cd $HOME/factory_tmp

        # =========================================================
        # 📦 パート1: ポータブル実行環境（ランタイム）の配置
        # =========================================================
        
        # --- ① Node.js Linuxポータブルの取得 ---
        echo "[missionLog] [ACTION] Node.js ポータブルバイナリを取得中..."
        NODE_VER="v18.16.0"
        aria2c -x 16 -s 16 "https://nodejs.org/dist/${NODE_VER}/node-${NODE_VER}-linux-x64.tar.xz"
        tar -xf "node-${NODE_VER}-linux-x64.tar.xz"
        mkdir -p "$RUNTIME_DIR/node"
        cp -r node-${NODE_VER}-linux-x64/* "$RUNTIME_DIR/node/"

        # --- ② Java (OpenJDK) ポータブルの取得 ---
        echo "[missionLog] [ACTION] OpenJDK ポータブルバイナリを取得中..."
        aria2c -x 16 -s 16 "https://github.com/adoptium/temurin17-binaries/releases/download/jdk-17.0.7%2B7/OpenJDK17U-jdk_x64_linux_hotspot_17.0.7_7.tar.gz"
        tar -xf OpenJDK17U-jdk_x64_linux_hotspot_17.0.7_7.tar.gz
        JAVA_DIR_NAME=$(ls -d jdk-* | head -n 1)
        mkdir -p "$RUNTIME_DIR/java"
        cp -r "$JAVA_DIR_NAME"/* "$RUNTIME_DIR/java/"

        # --- ③ Python スタンドアロンポータブルの取得 ---
        echo "[missionLog] [ACTION] Python スタンドアロンバイナリを取得中..."
        aria2c -x 16 -s 16 "https://github.com/indygreg/python-build-standalone/releases/download/20230507/cpython-3.10.11+20230507-x86_64-unknown-linux-gnu-install_only.tar.gz"
        tar -xf cpython-3.10.11+20230507-x86_64-unknown-linux-gnu-install_only.tar.gz
        mkdir -p "$RUNTIME_DIR/python"
        cp -r python/* "$RUNTIME_DIR/python/"

        # --- ④ Emscripten (emcc) ポータブルの取得とセットアップ ---
        echo "[missionLog] [ACTION] Emscripten (emsdk) を取得・ビルド中..."
        aria2c -x 16 -s 16 -o emsdk-master.zip "https://github.com/emscripten-core/emsdk/archive/refs/heads/main.zip"
        unzip -q emsdk-master.zip
        mkdir -p "$RUNTIME_DIR/emsdk"
        cp -r emsdk-main/* "$RUNTIME_DIR/emsdk/"
        cd "$RUNTIME_DIR/emsdk"
        
        chmod +x ./emsdk.py
        echo "[missionLog] [ACTION] emsdk.py を用いて latest のインストールを実行します。"
        "$RUNTIME_DIR/python/bin/python3" ./emsdk.py install latest
        echo "[missionLog] [ACTION] emsdk.py を用いて latest の有効化を実行します。"
        "$RUNTIME_DIR/python/bin/python3" ./emsdk.py activate latest
        cd $HOME/factory_tmp

        # =========================================================
        # 🛠️ パート2: メディアツールおよび各種デコンパイラの配置
        # =========================================================

        # --- ⑤ ffmpeg / ffprobe ポータブルバイナリ取得 (遅延トラップ完全破壊・GitHub最優先ルート) ---
        echo "[missionLog] [ACTION] ffmpeg スタティックバイナリの強襲奪還作戦を開始します。"
        FF_SUCCESS=false

        # 【超安定ルート1】 GitHubの超高帯域公式ミラー・リリースから爆速で引き抜く（メイン作戦）
        echo "[missionLog] [ACTION] ルート1: GitHub上の超安定スタティックリリースから奪還を試みます。"
        if curl -L -k --max-time 20 -o ffmpeg-release-amd64-static.tar.xz "https://github.com/BuriKani/ffmpeg-static-binaries/releases/download/v6.0/ffmpeg-release-amd64-static.tar.xz" || \
           curl -L -k --max-time 20 -o ffmpeg-release-amd64-static.tar.xz "https://github.com/GyanD/codexffmpeg/releases/download/6.0/ffmpeg-6.0-essentials_build.tar.xz"; then
          
          FILE_SIZE=$(stat -c%s "ffmpeg-release-amd64-static.tar.xz" 2>/dev/null || echo 0)
          if [ "$FILE_SIZE" -gt 1048576 ]; then
            echo "[missionLog] [STATUS] ルート1成功！強襲ダウンロード完了（サイズ: $FILE_SIZE バイト）。"
            FF_SUCCESS=true
          fi
        fi

        # 【ハングアップ対策ルート2】 johnvansickle公式 (10秒制限付きでハングアップを即座に蹴る)
        if [ "$FF_SUCCESS" = false ]; then
          echo "[missionLog] [WARNING] ルート1が不発。ルート2: johnvansickleへ最大10秒制限を課してブラウザ偽装アタックを敢行。"
          rm -f ffmpeg-release-amd64-static.tar.xz
          
          curl -L -k --max-time 10 -A "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -o ffmpeg-release-amd64-static.tar.xz "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz"
          
          FILE_SIZE=$(stat -c%s "ffmpeg-release-amd64-static.tar.xz" 2>/dev/null || echo 0)
          if [ "$FILE_SIZE" -gt 1048576 ]; then
            echo "[missionLog] [STATUS] ルート2成功。正常アーカイブ確認。"
            FF_SUCCESS=true
          fi
        fi

        # 【最終防衛ラインルート3】 ネットワークが全面崩壊した時のコンテナローカル直接抽出
        if [ "$FF_SUCCESS" = false ]; then
          echo "[missionLog] [WARNING] 全ネットワークルートが遮断またはハングアップしました。最終防衛ライン: ホスト直接抽出を実行。"
          sudo apt-get update && sudo apt-get install -y ffmpeg
          mkdir -p "$TOOL_DIR/ffmpeg"
          cp /usr/bin/ffmpeg "$TOOL_DIR/ffmpeg/ffmpeg"
          cp /usr/bin/ffprobe "$TOOL_DIR/ffmpeg/ffprobe"
          chmod +x "$TOOL_DIR/ffmpeg/ffmpeg" "$TOOL_DIR/ffmpeg/ffprobe"
          FF_SUCCESS=true
          echo "[missionLog] [STATUS] 最終手段：内蔵兵装からのffmpeg抽出配備完了。"
        else
          # ルート1または2で正常にダウンロードできた場合の展開
          echo "[missionLog] [ACTION] ダウンロードしたアーカイブを展開中..."
          tar -xf ffmpeg-release-amd64-static.tar.xz
          
          # ディレクトリ名の揺れを完全吸収する柔軟マッピング
          FFMPEG_DIR_NAME=$(ls -d ffmpeg-*-amd64-static ffmpeg-*-essentials_build 2>/dev/null | head -n 1)
          mkdir -p "$TOOL_DIR/ffmpeg"
          
          if [ -f "$FFMPEG_DIR_NAME/ffmpeg" ]; then
            cp "$FFMPEG_DIR_NAME/ffmpeg" "$TOOL_DIR/ffmpeg/"
            cp "$FFMPEG_DIR_NAME/ffprobe" "$TOOL_DIR/ffmpeg/"
          elif [ -f "$FFMPEG_DIR_NAME/bin/ffmpeg" ]; then
            cp "$FFMPEG_DIR_NAME/bin/ffmpeg" "$TOOL_DIR/ffmpeg/"
            cp "$FFMPEG_DIR_NAME/bin/ffprobe" "$TOOL_DIR/ffmpeg/"
          fi
          chmod +x "$TOOL_DIR/ffmpeg/ffmpeg" "$TOOL_DIR/ffmpeg/ffprobe"
          echo "[missionLog] [STATUS] ポータブルffmpegの格納に成功しました！"
        fi

        # --- ⑥ cwebp (WebP画像コンパイラ) スタティックバイナリ取得 ---
        echo "[missionLog] [ACTION] WebP (cwebp) スタティックバイナリの取得を開始します。"
        aria2c -x 16 -s 16 --check-certificate=false "https://storage.googleapis.com/downloads.webofmind.org/webp/libwebp-1.3.0-linux-x86-64.tar.gz" || \
        aria2c -x 16 -s 16 --check-certificate=false "https://storage.googleapis.com/downloads.webmproject.org/releases/webp/libwebp-1.3.0-linux-x86-64.tar.gz" || \
        curl -L -k -O "https://storage.googleapis.com/downloads.webmproject.org/releases/webp/libwebp-1.3.0-linux-x86-64.tar.gz"
        
        tar -xf libwebp-1.3.0-linux-x86-64.tar.gz
        mkdir -p "$TOOL_DIR/webp"
        cp libwebp-1.3.0-linux-x86-64/bin/cwebp "$TOOL_DIR/webp/"
        cp libwebp-1.3.0-linux-x86-64/bin/dwebp "$TOOL_DIR/webp/"
        chmod +x "$TOOL_DIR/webp/cwebp" "$TOOL_DIR/webp/dwebp"

        # --- ⑦ jadx (Java/Androidデコンパイラ) の取得 ---
        echo "[missionLog] [ACTION] jadx 最新バイナリパッケージを取得します。"
        JADX_RAW_VERSION=$(curl -s -k https://api.github.com/repos/skylot/jadx/releases/latest | grep -Po '"tag_name": "\K[^"]*')
        JADX_CLEAN_VERSION="${JADX_RAW_VERSION#v}"
        
        echo "[missionLog] [STATUS] 解析されたjadxのクリーンバージョンは [ ${JADX_CLEAN_VERSION} ] です。"
        
        if ! aria2c -x 16 -s 16 --check-certificate=false "https://github.com/skylot/jadx/releases/download/${JADX_RAW_VERSION}/jadx-${JADX_CLEAN_VERSION}.zip"; then
          echo "[missionLog] [WARNING] aria2cでのjadx取得に失敗。curlによる強制突破を敢行します。"
          curl -L -k -O "https://github.com/skylot/jadx/releases/download/${JADX_RAW_VERSION}/jadx-${JADX_CLEAN_VERSION}.zip"
        fi
        
        mkdir -p "$TOOL_DIR/jadx"
        unzip -q "jadx-${JADX_CLEAN_VERSION}.zip" -d "$TOOL_DIR/jadx"
        chmod +x "$TOOL_DIR/jadx/bin/jadx"

        # --- ⑧ ilspycmd (.NETデコンパイラ) のビルド・配置 ---
        echo "[missionLog] [ACTION] ilspycmd をホスト.NET環境でローカルビルドして配置します。"
        dotnet tool install --tool-path "$TOOL_DIR/ilspycmd" ilspycmd

        # --- ⑨ rpatool (Ren'Py RPAアーカイブ抽出) の配置 ---
        echo "[missionLog] [ACTION] rpatool スクリプトを取得します。"
        mkdir -p "$TOOL_DIR/rpatool"
        aria2c -x 8 -s 8 --check-certificate=false -d "$TOOL_DIR/rpatool/" -o rpatool https://raw.githubusercontent.com/Shizmob/rpatool/master/rpatool || \
        curl -L -k -o "$TOOL_DIR/rpatool/rpatool" https://raw.githubusercontent.com/Shizmob/rpatool/master/rpatool
        chmod +x "$TOOL_DIR/rpatool/rpatool"

        # --- ⑩ unluac (Luaデコンパイラ) & Vineflower の配置 ---
        echo "[missionLog] [ACTION] Java系補助デコンパイラ (unluac, Vineflower) を取得します。"
        mkdir -p "$TOOL_DIR/unluac"
        aria2c -x 8 -s 8 --check-certificate=false -d "$TOOL_DIR/unluac/" -o unluac.jar "https://sourceforge.net/projects/unluac/files/latest/download" || \
        curl -L -k -o "$TOOL_DIR/unluac/unluac.jar" "https://sourceforge.net/projects/unluac/files/latest/download"
        
        mkdir -p "$TOOL_DIR/vineflower"
        aria2c -x 8 -s 8 --check-certificate=false -d "$TOOL_DIR/vineflower/" -o vineflower.jar "https://github.com/Vineflower/vineflower/releases/download/1.10.1/vineflower-1.10.1.jar" || \
        curl -L -k -o "$TOOL_DIR/vineflower/vineflower.jar" "https://github.com/Vineflower/vineflower/releases/download/1.10.1/vineflower-1.10.1.jar"

        cd $GITHUB_WORKSPACE
        echo "[missionLog] [STATUS] ポータブル実行環境（ランタイム）および全デコンパイラ・メディアツールの集積が100%完了しました！"

    # 4. 全ての成果物が揃ったフォルダを最高圧縮率でパッケージング
    - name: 全成果物（ランタイム＋全ツール）の最高圧縮パッケージング
      run: |
        echo "[missionLog] [ACTION] 作戦フェーズ4：ランタイムおよび全ツールを含んだ全軍アーカイブの圧縮を開始します。"
        mkdir -p $HOME/release_assets
        
        # bin_factory（runtimesとtoolsの両方が入っている）を丸ごと最高圧縮率で固める
        tar -cJf $HOME/release_assets/ultimate-complete-toolkit-linux-x64.tar.xz ./bin_factory
        
        echo "[missionLog] [STATUS] アーカイブ化が完了しました。全重量の確認:"
        du -sh $HOME/release_assets/ultimate-complete-toolkit-linux-x64.tar.xz
        echo "RELEASE_ASSET_PATH=$HOME/release_assets/ultimate-complete-toolkit-linux-x64.tar.xz" >> $GITHUB_ENV

    # 5. 生成した超高圧縮・全部入りアーカイブをGitHub Releaseに打ち込む
    - name: GitHub Release への完全体成果物強襲投入
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v-complete-${{ github.run_number }}"
        name: "Ultimate Complete Toolkit Build #${{ github.run_number }}"
        body: |
          Automated compilation and full packaging completed successfully!
          This archive contains BOTH portable runtimes and advanced decompilers/media utilities.
          
          **Packed Runtimes:**
          - Node.js (v18.16.0)
          - Java OpenJDK (17)
          - Python Standalone (3.10.11)
          - Emscripten / emcc (Latest via emsdk.py)
          
          **Packed Decouplers & Media Tools (Standalone/Portable):**
          - ffmpeg / ffprobe (Static Build)
          - cwebp / dwebp (Image Compiler)
          - jadx (Java/Android Decompiler)
          - ilspycmd (.NET Decompiler)
          - rpatool (RPA Extractor)
          - unluac (Lua Decompiler)
          - Vineflower (Java Decompiler)
        draft: false
        prerelease: false
        files: ${{ env.RELEASE_ASSET_PATH }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # 6. リポジトリ自タイムのインデックス変更を確定させてから、最後に `git push`
    - name: リポジトリの同期および Git Push
      run: |
        echo "[missionLog] [ACTION] 最終フェーズ：完全体（runtimes & tools）同期の履歴をGitリポジトリへPushします。"
        
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # 変更されたランタイムおよびツール群をすべてインデックスに加える
        git add ./bin_factory/
        
        if git diff --cached --quiet; then
          echo "[missionLog] [STATUS] 報告: 変更されたバイナリデータはありません。Pushをスキップします。"
        else
          echo "[missionLog] [ACTION] 変更を検知。ローカルコミットを実行します。"
          git commit -m "Automated Factory: Portable runtimes and full tools synchronized [Build #${{ github.run_number }}]"
          
          echo "[missionLog] [ACTION] リポジトリへの最終Git Pushを敢行します！"
          git push origin main
          echo "[missionLog] [STATUS] 任務完全完了！ffmpegを含む全ツールと全ランタイムが、ReleaseおよびGitに完全配備されたぞ！"
        fi
